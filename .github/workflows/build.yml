name: Build Mobile Artifacts

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  android:
    name: Android Release Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set build number
        id: build_num
        run: echo "num=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Ensure platform folders exist
        run: |
          if [ ! -d android ] || [ ! -d ios ]; then
            flutter create --platforms=android,ios .
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests (if any)
        run: |
          if [ -d test ] && [ "$(find test -name '*_test.dart' | wc -l)" -gt 0 ]; then
            flutter test
          else
            echo "No tests found, skipping."
          fi

      - name: Build Android APK
        run: flutter build apk --release --build-number=${{ steps.build_num.outputs.num }}

      - name: Build Android App Bundle
        run: flutter build appbundle --release --build-number=${{ steps.build_num.outputs.num }}

      - name: Stage Android artifacts
        run: |
          mkdir -p android-release
          cp build/app/outputs/flutter-apk/app-release.apk android-release/
          cp build/app/outputs/bundle/release/app-release.aab android-release/

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: android-release/
          if-no-files-found: error
          retention-days: 14

  ios_validate:
    name: iOS Validate Build
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set build number
        id: build_num
        run: echo "num=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Ensure iOS platform folder exists
        run: |
          if [ ! -d ios ]; then
            flutter create --platforms=android,ios .
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign --build-number=${{ steps.build_num.outputs.num }}

      - name: Package unsigned IPA
        run: |
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Runner.app not found at $APP_PATH"
            exit 1
          fi
          rm -rf build/ios/ipa
          mkdir -p build/ios/ipa/Payload
          cp -R "$APP_PATH" build/ios/ipa/Payload/
          (
            cd build/ios/ipa
            zip -r dcss-mobile-unsigned.ipa Payload
          )

      - name: Upload iOS IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: build/ios/ipa/dcss-mobile-unsigned.ipa
          if-no-files-found: error
          retention-days: 14

  web:
    name: Web PWA Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set build number
        id: build_num
        run: echo "num=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Ensure web platform folder exists
        run: |
          if [ ! -d web ]; then
            flutter create --platforms=web .
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Set deploy paths
        id: preview
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base_href=/dcss-mobile/pr-${{ github.event.pull_request.number }}/" >> "$GITHUB_OUTPUT"
            echo "preview_url=https://${{ github.repository_owner }}.github.io/dcss-mobile/pr-${{ github.event.pull_request.number }}/" >> "$GITHUB_OUTPUT"
            echo "destination_dir=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "base_href=/dcss-mobile/" >> "$GITHUB_OUTPUT"
            echo "preview_url=https://${{ github.repository_owner }}.github.io/dcss-mobile/" >> "$GITHUB_OUTPUT"
            echo "destination_dir=." >> "$GITHUB_OUTPUT"
          fi

      - name: Build Flutter Web
        run: flutter build web --release --base-href "${{ steps.preview.outputs.base_href }}" --build-number=${{ steps.build_num.outputs.num }}

      - name: Deploy to GitHub Pages (production)
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
          publish_branch: gh-pages
          keep_files: true

      - name: Deploy PR preview
        if: github.event_name == 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
          publish_branch: gh-pages
          destination_dir: pr-${{ github.event.pull_request.number }}
          keep_files: true

      - name: Comment PR with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `🚀 **PWA Preview deployed!**\n\n📱 **URL:** ${{ steps.preview.outputs.preview_url }}\n\n> This preview will be removed automatically when the PR is closed.`;
            const issue_number = context.issue.number;
            const { owner, repo } = context.repo;

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
            });

            const existing = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('PWA Preview deployed')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - android
      - ios_validate
    runs-on: ubuntu-latest

    steps:
      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: release-assets/android

      - name: Download iOS IPA artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: release-assets/ios

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/android/app-release.apk
            release-assets/android/app-release.aab
            release-assets/ios/dcss-mobile-unsigned.ipa
