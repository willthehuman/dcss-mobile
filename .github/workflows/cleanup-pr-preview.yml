name: Cleanup PR Preview

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write

jobs:
  cleanup:
    name: Remove PR preview folder
    runs-on: ubuntu-latest

    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Remove PR preview directory
        run: |
          PR_DIR="pr-${{ github.event.pull_request.number }}"
          if [ -d "$PR_DIR" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "$PR_DIR"
            git commit -m "cleanup: remove PR ${{ github.event.pull_request.number }} preview"
            git push
            echo "Removed preview folder: $PR_DIR"
          else
            echo "No preview folder found for PR ${{ github.event.pull_request.number }}, skipping."
          fi
